services:
  - type: web
    name: telegram-alert
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run telegram:setup && npm start
    initialDeployHook: npm run telegram:setup
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-alert-db
          property: connectionString

databases:
  - name: telegram-alert-db
    plan: free
